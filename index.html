<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>등록부 서명 도우미</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --blue: #3B6EEA; --blue-dark: #2A55C9; --red: #E84444; --green: #22A06B;
            --g50: #F8FAFC; --g100: #F1F5F9; --g200: #E2E8F0; --g300: #CBD5E1;
            --g400: #94A3B8; --g500: #64748B; --g700: #334155; --g900: #0F172A;
            --white: #FFF; --shadow: 0 4px 24px rgba(59,110,234,.1);
            --shadow-lg: 0 8px 40px rgba(59,110,234,.16);
            --accent: #3A9B5C; --accent-dk: #2E7D48;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #E8F5ED; min-height: 100vh; color: var(--g900); overflow-x: hidden; }
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }

        /* 메인 화면 */
        #screen-main { min-height: 100vh; background: linear-gradient(145deg, #6DBF8A, #4CAF70 50%, #3A9B5C); align-items: center; justify-content: center; padding: 24px; }
        .main-card { background: var(--white); border-radius: 28px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(30,50,120,.25); text-align: center; }
        .main-title { font-size: 26px; font-weight: 900; line-height: 1.3; margin-bottom: 20px; }
        .main-title span { display: block; color: var(--accent); font-size: 30px; }
        .main-buttons { display: flex; flex-direction: column; gap: 12px; }
        .btn-primary { background: var(--accent); color: white; border: none; border-radius: 14px; padding: 18px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all .2s; box-shadow: 0 4px 16px rgba(58,155,92,.35); }
        .btn-secondary { background: var(--g100); color: var(--g700); border: 1.5px solid var(--g200); border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }

        /* 가이드 박스 */
        .guide-box { background: #F0FBF4; border: 1.5px solid #A8DFB8; border-radius: 14px; padding: 18px; margin-bottom: 24px; text-align: left; }
        .guide-title { font-size: 13px; font-weight: 800; color: var(--accent-dk); margin-bottom: 10px; }
        .guide-step { display: flex; gap: 10px; margin-bottom: 8px; font-size: 12.5px; }
        .guide-num { min-width: 20px; height: 20px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }

        /* 관리자 화면 공통 */
        #screen-admin { background: var(--g50); min-height: 100vh; }
        .admin-header { background: white; border-bottom: 1px solid var(--g200); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; sticky; top: 0; z-index: 100; }
        .admin-content { padding: 24px; max-width: 1000px; margin: 0 auto; width: 100%; }
        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 24px; }
        .card-title { font-size: 17px; font-weight: 800; border-left: 4px solid var(--blue); padding-left: 12px; margin-bottom: 20px; }

        /* 폼 요소 */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .form-input { width: 100%; border: 1.5px solid var(--g200); border-radius: 10px; padding: 12px; font-size: 14px; outline: none; transition: border 0.2s; }
        .form-input:focus { border-color: var(--blue); }
        .category-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .category-btn { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--g200); background: white; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--g500); }
        .category-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 리스트 아이템 */
        .ev-item { background: white; border-radius: 12px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .ev-info h3 { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
        .ev-meta { font-size: 12px; color: var(--g500); }
        .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; margin-right: 5px; }
        .badge-blue { background: #E3F2FD; color: #1565C0; }

        /* 서명 캔버스 */
        .canvas-wrap { background: white; border: 2px dashed var(--g300); border-radius: 12px; overflow: hidden; margin: 15px 0; touch-action: none; position: relative; }
        #sig-canvas { width: 100%; height: 250px; cursor: crosshair; }

        /* 모달 및 로딩 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 20px; padding: 30px; width: 100%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--g200); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 탭 */
        .admin-tabs { display: flex; border-bottom: 2px solid var(--g200); margin-bottom: 20px; }
        .admin-tab-btn { padding: 12px 20px; border: none; background: none; font-weight: 700; color: var(--g400); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .admin-tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* 유틸리티 */
        .btn-a { border: 1.5px solid var(--g200); background: white; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-left: 5px; }
        .btn-a-blue { color: var(--blue); border-color: var(--blue); }
        .btn-a-red { color: var(--red); border-color: var(--red); }
        .btn-a-green { color: var(--green); border-color: var(--green); }
        
        .code-blk { background: #1E2A3A; color: #A8D8A8; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; overflow-x: auto; position: relative; white-space: pre-wrap; margin: 10px 0; }
        .btn-copy { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid white; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        /* 인쇄 및 PDF 영역 (화면에서 숨김) */
        #pdf-area, #qr-area { display: none; }

        @media print {
            body * { visibility: hidden; }
            #pdf-area, #pdf-area * { visibility: visible !important; }
            #pdf-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
        }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 24px; border-radius: 50px; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 4000; pointer-events: none; }
        .toast.show { opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <div style="margin-top:15px; font-weight:700; color:var(--g700)">처리 중...</div>
</div>

<!-- 토스트 -->
<div id="toast" class="toast">메시지</div>

<!-- 메인 화면 -->
<div id="screen-main" class="screen active">
    <div class="main-card">
        <div class="main-title">등록부<span>서명 도우미</span></div>
        <div class="guide-box">
            <div class="guide-title">📋 이용 안내</div>
            <div class="guide-step"><div class="guide-num">1</div><div><b>서명하기</b> 버튼 클릭 후 행사 선택</div></div>
            <div class="guide-step"><div class="guide-num">2</div><div>본인의 <b>성명/소속</b> 입력</div></div>
            <div class="guide-step"><div class="guide-num">3</div><div>화면에 <b>직접 서명</b>하면 완료!</div></div>
        </div>
        <div class="main-buttons">
            <button class="btn-primary" onclick="showUserFlow()">✍️ 서명하기</button>
            <button class="btn-secondary" onclick="openModal('modal-login')">관리자 모드</button>
        </div>
    </div>
</div>

<!-- 로그인 모달 -->
<div id="modal-login" class="modal-overlay">
    <div class="modal">
        <div class="card-title" style="border:none; padding:0; margin-bottom:15px">관리자 인증</div>
        <input type="password" id="admin-pw" class="form-input" placeholder="비밀번호 입력" style="margin-bottom:15px">
        <div style="display:flex; gap:10px">
            <button class="btn-secondary" style="flex:1; padding:12px" onclick="closeModal('modal-login')">취소</button>
            <button class="btn-primary" style="flex:1; padding:12px; font-size:15px" onclick="checkLogin()">확인</button>
        </div>
    </div>
</div>

<!-- 사용자: 행사 선택 화면 -->
<div id="screen-user-list" class="screen">
    <div class="admin-header">
        <button class="btn-a" onclick="goHome()">← 돌아가기</button>
        <h2 style="font-size:18px">행사를 선택하세요</h2>
        <div></div>
    </div>
    <div class="admin-content" id="user-event-list">
        <!-- 행사 카드들이 여기에 동적으로 생성됨 -->
    </div>
</div>

<!-- 사용자: 정보 입력 및 서명 화면 -->
<div id="screen-sign" class="screen">
    <div class="admin-header">
        <button class="btn-a" onclick="showUserFlow()">← 이전</button>
        <h2 style="font-size:16px" id="sign-event-title">행사명</h2>
        <div></div>
    </div>
    <div class="admin-content">
        <div class="card">
            <div class="card-title">정보 입력</div>
            <div class="form-row">
                <input type="text" id="u-dept" class="form-input" placeholder="소속 (예: OO초등학교)">
                <input type="text" id="u-pos" class="form-input" placeholder="직위 (예: 교사, 주무관)">
            </div>
            <input type="text" id="u-name" class="form-input" placeholder="성명">
        </div>

        <div class="card">
            <div class="card-title">서명란</div>
            <div class="canvas-wrap">
                <canvas id="sig-canvas"></canvas>
            </div>
            <div style="display:flex; gap:10px">
                <button class="btn-secondary" style="flex:1" onclick="clearCanvas()">다시 쓰기</button>
                <button class="btn-primary" style="flex:2" onclick="submitSignature()">서명 완료</button>
            </div>
        </div>
    </div>
</div>

<!-- 관리자 메인 화면 -->
<div id="screen-admin" class="screen">
    <div class="admin-header">
        <h2 style="font-size:18px">관리자 패널</h2>
        <button class="btn-a btn-a-red" onclick="goHome()">로그아웃</button>
    </div>
    <div class="admin-content">
        <div class="admin-tabs">
            <button id="tab-btn-1" class="admin-tab-btn active" onclick="switchTab(1)">행사 관리</button>
            <button id="tab-btn-2" class="admin-tab-btn" onclick="switchTab(2)">동기화 설정</button>
        </div>

        <!-- 탭 1: 행사 관리 -->
        <div id="tab-1" class="tab-panel active">
            <div class="card">
                <div class="card-title">새 행사 등록</div>
                <div class="category-tabs" id="cat-tabs">
                    <button class="category-btn active" onclick="setCat(this, '연수')">연수</button>
                    <button class="category-btn" onclick="setCat(this, '회의')">회의</button>
                    <button class="category-btn" onclick="setCat(this, '위원회')">위원회</button>
                    <button class="category-btn" onclick="setCat(this, '기타')">기타</button>
                </div>
                <div class="form-row">
                    <input type="text" id="f-title" class="form-input" placeholder="행사 제목">
                    <input type="text" id="f-loc" class="form-input" placeholder="장소">
                </div>
                <div class="form-row">
                    <input type="date" id="f-date" class="form-input">
                    <input type="text" id="f-time" class="form-input" placeholder="시간 (예: 14:00~)">
                </div>
                <button class="btn-primary" style="width:100%" onclick="addEvent()">등록하기</button>
            </div>

            <div id="admin-event-list">
                <!-- 등록된 행사 목록 -->
            </div>
        </div>

        <!-- 탭 2: 동기화 설정 -->
        <div id="tab-2" class="tab-panel">
            <div class="card">
                <div class="card-title">구글 스프레드시트 연동</div>
                <p style="font-size:13px; color:var(--g500); margin-bottom:15px">
                    구글 앱스 스크립트(GAS)를 통해 데이터를 안전하게 클라우드에 보관할 수 있습니다.
                </p>
                <input type="text" id="gas-url" class="form-input" placeholder="https://script.google.com/macros/s/.../exec" style="margin-bottom:10px">
                <button class="btn-primary" style="width:100%" onclick="saveGasUrl()">설정 저장 및 연결 테스트</button>
                
                <div class="code-blk" id="gas-code-area">
                    <button class="btn-copy" onclick="copyGasCode()">코드 복사</button>
                    <span id="gas-code-text"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 인쇄용 영역 (PDF) -->
<div id="pdf-area">
    <div style="padding:40px; background:white;">
        <h1 id="print-title" style="text-align:center; font-size:24px; margin-bottom:10px;">참석자 등록부</h1>
        <div id="print-meta" style="text-align:center; margin-bottom:30px; font-size:14px;"></div>
        <table style="width:100%; border-collapse:collapse; border:2px solid black;">
            <thead>
                <tr>
                    <th style="border:1px solid black; padding:10px; width:50px;">연번</th>
                    <th style="border:1px solid black; padding:10px; width:120px;">소속</th>
                    <th style="border:1px solid black; padding:10px; width:100px;">직위</th>
                    <th style="border:1px solid black; padding:10px; width:100px;">성명</th>
                    <th style="border:1px solid black; padding:10px;">서명</th>
                </tr>
            </thead>
            <tbody id="print-tbody"></tbody>
        </table>
    </div>
</div>

<!-- QR 코드 출력용 -->
<div id="qr-area">
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:white; text-align:center; padding:50px;">
        <h1 id="qr-title" style="font-size:32px; margin-bottom:20px;">행사 제목</h1>
        <div id="qr-gen" style="margin:30px 0;"></div>
        <p style="font-size:24px; font-weight:800; color:var(--blue)">스마트폰 카메라로 스캔하여 서명하세요</p>
        <p style="margin-top:20px; font-size:16px; color:#666">전라남도교육청 등록부 지원 서비스</p>
    </div>
</div>

<script>
    // --- 초기 설정 및 데이터 상태 ---
    let state = {
        events: JSON.parse(localStorage.getItem('ev_data') || '[]'),
        signatures: JSON.parse(localStorage.getItem('sig_data') || '[]'),
        gasUrl: localStorage.getItem('gas_url') || '',
        currentCat: '연수',
        selectedEventId: null
    };

    const $ = id => document.getElementById(id);

    // --- 화면 전환 로직 ---
    function show(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        $(screenId).classList.add('active');
        window.scrollTo(0, 0);
    }

    function goHome() { show('screen-main'); }

    function openModal(id) { $(id).classList.add('active'); }
    function closeModal(id) { $(id).classList.remove('active'); }

    function toast(msg) {
        const t = $('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // --- 관리자 로직 ---
    function checkLogin() {
        if ($('admin-pw').value === '1234') { // 기본 비밀번호 1234
            closeModal('modal-login');
            show('screen-admin');
            renderAdminEvents();
            $('admin-pw').value = '';
        } else {
            toast('비밀번호가 틀렸습니다.');
        }
    }

    function switchTab(idx) {
        document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        $(`tab-btn-${idx}`).classList.add('active');
        $(`tab-${idx}`).classList.add('active');
        if(idx === 2) renderGasCode();
    }

    function setCat(btn, cat) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.currentCat = cat;
    }

    function addEvent() {
        const title = $('f-title').value.trim();
        if (!title) return toast('제목을 입력하세요.');
        
        const newEv = {
            id: 'ev_' + Date.now(),
            title: title,
            cat: state.currentCat,
            loc: $('f-loc').value || '미지정',
            date: $('f-date').value || new Date().toISOString().split('T')[0],
            time: $('f-time').value || '',
            createdAt: new Date().toISOString()
        };

        state.events.unshift(newEv);
        saveData();
        renderAdminEvents();
        $('f-title').value = '';
        toast('행사가 등록되었습니다.');
    }

    function deleteEvent(id) {
        if (!confirm('해당 행사와 모든 서명 데이터가 삭제됩니다. 계속하시겠습니까?')) return;
        state.events = state.events.filter(e => e.id !== id);
        state.signatures = state.signatures.filter(s => s.eventId !== id);
        saveData();
        renderAdminEvents();
    }

    function renderAdminEvents() {
        const container = $('admin-event-list');
        if (state.events.length === 0) {
            container.innerHTML = '<div class="empty-list" style="text-align:center; padding:40px; color:#999">등록된 행사가 없습니다.</div>';
            return;
        }

        container.innerHTML = state.events.map(ev => {
            const sigCount = state.signatures.filter(s => s.eventId === ev.id).length;
            return `
                <div class="ev-item">
                    <div class="ev-info">
                        <span class="badge badge-blue">${ev.cat}</span>
                        <h3>${ev.title}</h3>
                        <div class="ev-meta">📍 ${ev.loc} | 📅 ${ev.date} ${ev.time}</div>
                        <div style="margin-top:5px; color:var(--blue); font-weight:700">서명 인원: ${sigCount}명</div>
                    </div>
                    <div class="ev-actions">
                        <button class="btn-a btn-a-green" onclick="printEvent('${ev.id}')">🖨️ 인쇄</button>
                        <button class="btn-a btn-a-blue" onclick="showQR('${ev.id}')">📱 QR</button>
                        <button class="btn-a btn-a-red" onclick="deleteEvent('${ev.id}')">삭제</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // --- 사용자 로직 ---
    function showUserFlow() {
        show('screen-user-list');
        const container = $('user-event-list');
        if (state.events.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:50px; color:#999">현재 진행 중인 행사가 없습니다.</div>';
            return;
        }

        container.innerHTML = state.events.map(ev => `
            <div class="card" onclick="selectEvent('${ev.id}')" style="cursor:pointer; border-left:6px solid var(--accent)">
                <div style="font-size:12px; color:var(--g500)">${ev.date} ${ev.time}</div>
                <h3 style="margin:5px 0">${ev.title}</h3>
                <div style="font-size:13px; color:var(--g700)">장소: ${ev.loc}</div>
            </div>
        `).join('');
    }

    function selectEvent(id) {
        state.selectedEventId = id;
        const ev = state.events.find(e => e.id === id);
        $('sign-event-title').innerText = ev.title;
        show('screen-sign');
        initCanvas();
    }

    // --- 서명 캔버스 로직 ---
    let canvas, ctx, drawing = false;

    function initCanvas() {
        canvas = $('sig-canvas');
        ctx = canvas.getContext('2d');
        
        // 고해상도 대응
        const ratio = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);

        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        };

        const start = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
        const move = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        const stop = () => { drawing = false; };

        canvas.onmousedown = start; canvas.onmousemove = move; window.onmouseup = stop;
        canvas.ontouchstart = start; canvas.ontouchmove = move; canvas.ontouchend = stop;
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    async function submitSignature() {
        const name = $('u-name').value.trim();
        const dept = $('u-dept').value.trim();
        const pos = $('u-pos').value.trim();

        if (!name || !dept) return toast('소속과 성명을 입력하세요.');
        
        // 빈 캔버스 체크 (픽셀 데이터 확인)
        const blank = document.createElement('canvas');
        blank.width = canvas.width; blank.height = canvas.height;
        if (canvas.toDataURL() === blank.toDataURL()) return toast('서명을 해주세요.');

        $('loading').style.display = 'flex';

        const sigData = {
            id: 'sig_' + Date.now(),
            eventId: state.selectedEventId,
            name, dept, pos,
            img: canvas.toDataURL('image/png'),
            time: new Date().toISOString()
        };

        state.signatures.push(sigData);
        saveData();

        // GAS 동기화 시도
        if (state.gasUrl) {
            try {
                await fetch(state.gasUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(sigData)
                });
            } catch (e) { console.error('Sync failed', e); }
        }

        setTimeout(() => {
            $('loading').style.display = 'none';
            toast('서명이 완료되었습니다. 감사합니다.');
            clearInputs();
            goHome();
        }, 800);
    }

    function clearInputs() {
        $('u-name').value = ''; $('u-dept').value = ''; $('u-pos').value = '';
    }

    // --- 인쇄 및 QR ---
    function printEvent(id) {
        const ev = state.events.find(e => e.id === id);
        const sigs = state.signatures.filter(s => s.eventId === id);
        
        $('print-title').innerText = `${ev.title} 참석자 등록부`;
        $('print-meta').innerText = `일시: ${ev.date} ${ev.time} | 장소: ${ev.loc}`;
        
        let html = '';
        for (let i = 0; i < Math.max(sigs.length, 15); i++) {
            const s = sigs[i] || { dept:'', pos:'', name:'', img:'' };
            html += `
                <tr>
                    <td style="border:1px solid black; height:50px; text-align:center">${i+1}</td>
                    <td style="border:1px solid black; text-align:center">${s.dept}</td>
                    <td style="border:1px solid black; text-align:center">${s.pos}</td>
                    <td style="border:1px solid black; text-align:center; font-weight:bold">${s.name}</td>
                    <td style="border:1px solid black; text-align:center">
                        ${s.img ? `<img src="${s.img}" style="height:40px">` : ''}
                    </td>
                </tr>
            `;
        }
        $('print-tbody').innerHTML = html;
        window.print();
    }

    function showQR(id) {
        const ev = state.events.find(e => e.id === id);
        const url = window.location.href.split('?')[0] + '?target=' + id;
        
        $('qr-title').innerText = ev.title;
        $('qr-gen').innerHTML = '';
        new QRCode($('qr-gen'), {
            text: url,
            width: 256,
            height: 256
        });
        
        $('qr-area').style.display = 'block';
        window.print();
        setTimeout(() => { $('qr-area').style.display = 'none'; }, 1000);
    }

    // --- 데이터 저장 및 연동 ---
    function saveData() {
        localStorage.setItem('ev_data', JSON.stringify(state.events));
        localStorage.setItem('sig_data', JSON.stringify(state.signatures));
    }

    function saveGasUrl() {
        const url = $('gas-url').value.trim();
        if (!url.startsWith('https://')) return toast('올바른 URL을 입력하세요.');
        state.gasUrl = url;
        localStorage.setItem('gas_url', url);
        toast('연동 설정이 저장되었습니다.');
    }

    function renderGasCode() {
        const code = `function doPost(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = JSON.parse(e.postData.contents);
  sheet.appendRow([
    new Date(), 
    data.eventId, 
    data.dept, 
    data.pos, 
    data.name, 
    data.img
  ]);
  return ContentService.createTextOutput("Success");
}`;
        $('gas-code-text').innerText = code;
    }

    function copyGasCode() {
        const text = $('gas-code-text').innerText;
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        toast('코드가 복사되었습니다.');
    }

    // --- 초기 실행 ---
    window.onload = () => {
        // URL 파라미터 체크 (QR 접속 시 바로 해당 행사로)
        const params = new URLSearchParams(window.location.search);
        const target = params.get('target');
        if (target && state.events.find(e => e.id === target)) {
            selectEvent(target);
        }
        
        // GAS URL 불러오기
        if (state.gasUrl) $('gas-url').value = state.gasUrl;
    };
</script>

</body>
</html>
